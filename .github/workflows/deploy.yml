name: Deploy DevOps IaC na AWS

on:
  push:
    branches:
      - main

jobs:
  terraform-ansible-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Credenciais da AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Verificar Versões das Ferramentas
        run: |
          echo "Terraform Version:"
          terraform --version
          echo "Ansible Version:"
          ansible --version

      - name: Iniciar e Validar o Terraform
        run: |
          terraform -chdir=terraform init
          terraform -chdir=terraform validate

      - name: Aplicar o Terraform
        run: terraform -chdir=terraform apply -auto-approve

      - name: Coletar o "public_ip" e Exportar
        run: |
          PUBLIC_IP=$(terraform -chdir=terraform output -raw public_ip)
          echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV
          echo "IP coletado: $PUBLIC_IP"

      - name: Configurar o SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Rodar Ansible
        working-directory: ./ansible
        run: |
          export ANSIBLE_HOST_KEY_CHECKING=False
          ansible-playbook -i "${{ env.PUBLIC_IP }}," -u ubuntu setup.yml

      - name: Encerramento do Provisionamento para Evitar Custos
        run: |
          echo "Infraestrutura ativa e rodando em: ${{ env.PUBLIC_IP }}"
          echo "Executando timer de 5 minutos para cancelamento do provisionamento..." 
          sleep 300
          echo "Encerrando o provisionamento para evitar custos adicionais..."
          terraform -chdir=terraform destroy -auto-approve
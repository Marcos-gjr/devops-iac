---
- name: Configurar Servidor DevOps com Docker
  hosts: aws_servers
  become: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:
    - name: Atualizar cache do Apt
      apt:
        update_cache: yes
        force_apt_get: yes

    - name: Instalação de pacotes necessários
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
        state: present

    - name: Adicionar chave GPG do Docker
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Adicionar repositório Docker
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable
        state: present

    - name: Instalar Docker Engine
      apt:
        name: docker-ce
        state: present

    - name: Garantir que o grupo docker existe
      group:
        name: docker
        state: present

    - name: Adicionar usuario ubuntu ao grupo docker
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Garantir que o Docker ta funcionando
      service:
        name: docker
        state: started
        enabled: yes

    - name: Limpar bibliotecas do Docker conflitantes
      pip:
        name: ["docker", "docker-py", "urllib3"]
        state: absent

    - name: Instalar biblioteca Docker estável e urllib3 compatível
      pip:
        name: 
          - "docker==6.1.3" 
          - "requests==2.31.0"
        executable: pip3
        
    - name: Criar rede do Docker para isolamento
      community.docker.docker_network:
        name: devops_web
        state: present

    - name: Criar diretório de configuração do Nginx
      file:
        path: /home/ubuntu/nginx
        state: directory

    - name: Repassar configuração do Nginx
      template:
        src: templates/nginx.conf.j2
        dest: /home/ubuntu/nginx/nginx.conf

    - name: Subir container Nginx como PRoxy reverso
      community.docker.docker_container:
        name: nginx-proxy
        image: nginx:latest
        state: started
        restart_policy: always
        published_ports:
          - "80:80"
        networks:
          - name: devops_web
        volumes:
          - /home/ubuntu/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    # Prometheus e Grafana

    - name: Instalar Docker Compose via Pip
      pip:
        name: docker-compose
        state: present

    - name: Criar diretório para o Prometheus
      file:
        path: /home/ubuntu/prometheus
        state: directory
        owner: ubuntu
        group: ubuntu

    - name: Configurar arquivo básico do Prometheus
      copy:
        dest: /home/ubuntu/prometheus/prometheus.yml
        content: |
          global:
            scrape_interval: 15s
          scrape_configs:
            - job_name: 'node_exporter'
              static_configs:
                - targets: ['node-exporter:9100']

    - name: Subir Instância de Monitoramento 
      community.docker.docker_container:
        name: "{{ item.name }}"
        image: "{{ item.image }}"
        volumes: "{{ item.volumes | default([]) }}"
        state: started
        restart_policy: always
        published_ports: "{{ item.ports }}"
        networks:
          - name: devops_web
      loop:
        - { name: 'grafana', image: 'grafana/grafana:latest', ports: ['3000:3000'] }
        - { name: 'prometheus', image: 'prom/prometheus:latest', ports: ['9090:9090'], volumes: ['/home/ubuntu/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml'] }
        - { name: 'node-exporter', image: 'prom/node-exporter:latest', ports: ['9100:9100'] }